name: Deploy Backend to VPS

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"

jobs:
  deploy:
    name: SSH Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script_stop: true
          script: |
            bash ~/StockManagement/scripts/deploy.sh

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Failed to deploy to VPS."
          echo "::error::Check logs at: Actions > ${{ github.run_id }}"
          echo "::error::Branch: ${{ github.ref_name }} | Commit: ${{ github.sha }}"
