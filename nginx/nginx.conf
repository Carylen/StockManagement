upstream api_backend {
    server api:8000;
}

# Correlate a request id end-to-end: reuse an inbound X-Request-ID (e.g. from
# Cloudflare / the client) when present, otherwise mint nginx's own $request_id.
map $http_x_request_id $req_id {
    default $http_x_request_id;
    ""      $request_id;
}

# Access log that carries the request id so nginx lines correlate with the API's.
log_format with_req_id '$remote_addr - $remote_user [$time_local] '
                       '"$request" $status $body_bytes_sent '
                       '"$http_referer" "$http_user_agent" rid=$req_id';

server {
    listen 80;
    server_name _;

    client_max_body_size 20M;

    access_log /var/log/nginx/access.log with_req_id;

    location / {
        proxy_pass         http://api_backend;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID      $req_id;

        # Echo the id back so it shows on every response (and matches the API's).
        add_header X-Request-ID $req_id always;

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}
