version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: utstock_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-utstock}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-utstock_secret}
      POSTGRES_DB: ${POSTGRES_DB:-utstock_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-utstock} -d ${POSTGRES_DB:-utstock_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: utstock_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-utstock}:${POSTGRES_PASSWORD:-utstock_secret}@postgres:5432/${POSTGRES_DB:-utstock_db}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-32chars-min}
      ACCESS_TOKEN_EXPIRE_HOURS: ${ACCESS_TOKEN_EXPIRE_HOURS:-12}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
